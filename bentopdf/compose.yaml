x-arcane:
  icon: ${SELFHST_ICONS:-missing-icon-source}/svg/bentopdf.svg
  urls:
    - https://github.com/alam00000/bentopdf
    - bentopdf.vm1.REDACTED_DOMAIN_1
networks:
  proxy:
    external: true
services:
  bentopdf:
    image: ghcr.io/alam00000/bentopdf:latest
    volumes:
      - /etc/localtime:/etc/localtime:ro
    container_name: ${STACK}
    restart: unless-stopped
    networks:
      - proxy
    labels:
      - com.getarcaneapp.arcane.icon=${SELFHST_ICONS:-missing-icon-source}/svg/${STACK}.svg
      - "traefik.enable=true"
      - "traefik.http.routers.${STACK}.entrypoints=https"
      - "traefik.http.routers.${STACK}.rule=Host(`${STACK}.vm1.REDACTED_DOMAIN_1`)"
      - "traefik.http.routers.${STACK}.tls=true"
      - "traefik.http.routers.${STACK}.tls.certresolver=cloudflare"
      - "traefik.http.services.${STACK}.loadbalancer.server.port=8080"