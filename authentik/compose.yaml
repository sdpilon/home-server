x-arcane:
  # https://cdn.jsdelivr.net/gh/selfhst/icons@main/webp/
  icon: ${SELFHST_WEBP:-missing icon source}/authentik.webp
services:
  postgresql:
    container_name: ${STACK}-postgresql
    env_file: .env
    environment:
      POSTGRES_DB: ${PG_DB:-authentik}
      POSTGRES_PASSWORD: ${PG_PASS:?database password required}
      POSTGRES_USER: ${PG_USER:-authentik}
    healthcheck:
      interval: 30s
      retries: 5
      start_period: 20s
      test:
      - CMD-SHELL
      - pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}
      timeout: 5s
    image: docker.io/library/postgres:16-alpine
    restart: unless-stopped
    volumes:
    - database:/var/lib/postgresql/data
    networks:
    - authentik
    labels:
    - com.getarcaneapp.arcane.icon=${SELFHST_WEBP:-missing icon source}/postgresql.webp

  server:
    container_name: ${STACK}-server
    command: server
    depends_on:
      postgresql:
        condition: service_healthy
    env_file:
    - .env
    environment:
      AUTHENTIK_POSTGRESQL__HOST: postgresql
      AUTHENTIK_POSTGRESQL__NAME: ${PG_DB:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASS}
      AUTHENTIK_POSTGRESQL__USER: ${PG_USER:-authentik}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?secret key required}
    image: ${AUTHENTIK_IMAGE:-ghcr.io/goauthentik/server}:${AUTHENTIK_TAG:-2026.2}
    restart: unless-stopped
    shm_size: 512mb
    volumes:
    - ./data:/data
    - ./custom-templates:/templates
    networks:
    - authentik
    - proxy
    labels:
    - com.getarcaneapp.arcane.icon=${SELFHST_WEBP:-missing icon source}/authentik.webp
    - "traefik.enable=true"
    - "traefik.docker.network=proxy"
    - "traefik.http.routers.authentik.entrypoints=https"
    - "traefik.http.routers.authentik.rule=Host(`authentik.REDACTED_DOMAIN_1`)"
    - "traefik.http.routers.authentik.tls=true"
    - "traefik.http.routers.authentik.tls.certresolver=cloudflare"
    - "traefik.http.services.authentik.loadbalancer.server.port=9000"

  worker:
    container_name: ${STACK}-worker
    command: worker
    depends_on:
      postgresql:
        condition: service_healthy
    env_file:
    - .env
    environment:
      AUTHENTIK_POSTGRESQL__HOST: postgresql
      AUTHENTIK_POSTGRESQL__NAME: ${PG_DB:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASS}
      AUTHENTIK_POSTGRESQL__USER: ${PG_USER:-authentik}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?secret key required}
    image: ${AUTHENTIK_IMAGE:-ghcr.io/goauthentik/server}:${AUTHENTIK_TAG:-2026.2}
    restart: unless-stopped
    shm_size: 512mb
    user: root
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock
    - ./data:/data
    - ./certs:/certs
    - ./custom-templates:/templates
    networks:
    - authentik
    labels:
    - com.getarcaneapp.arcane.icon=${SELFHST_WEBP:-missing icon source}/authentik.webp

volumes:
  database:
    driver: local

networks:
  authentik:
    driver: bridge
  proxy:
    external: true