name: servarr
x-arcane:
  icon: ${SELFHST_WEBP}/servarr.webp

###############################################
# Common Keys for all apps
###############################################

x-common-keys: &common-keys
    restart: unless-stopped
    logging:
      driver: json-file
    environment:
      PUID: 1000
      PGID: 1000
      TZ: ${TZ}
    networks:
      - default  # Keeps it on arr_network
      - proxy    # Adds it to proxy network for Traefik
    dns:
      - 1.1.1.1
      - 1.0.0.1

services:
###############################################
# RADARR - Movies
###############################################
  radarr:
    <<: *common-keys
    labels:
      - com.getarcaneapp.arcane.icon=${SELFHST_WEBP}/radarr.webp
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.radarr.entrypoints=https"
      - "traefik.http.routers.radarr.rule=Host(`radarr.vm1.REDACTED_DOMAIN_1`)"
      - "traefik.http.routers.radarr.tls=true"
      - "traefik.http.routers.radarr.tls.certresolver=cloudflare"
      - "traefik.http.services.radarr.loadbalancer.server.port=7878"
    container_name: radarr
    image: ghcr.io/hotio/radarr:latest
    ports:
      - 7878:7878
    volumes:
      - /etc/localtime:/etc/localtime:ro #read-only
      - /docker/appdata/radarr:/config
      - /data:/data

###############################################
# SONARR - TV Shows
###############################################
  sonarr:
    <<: *common-keys
    labels:
      - com.getarcaneapp.arcane.icon=${SELFHST_WEBP}/sonarr.webp
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.sonarr.entrypoints=https"
      - "traefik.http.routers.sonarr.rule=Host(`sonarr.vm1.REDACTED_DOMAIN_1`)"
      - "traefik.http.routers.sonarr.tls=true"
      - "traefik.http.routers.sonarr.tls.certresolver=cloudflare"
      - "traefik.http.services.sonarr.loadbalancer.server.port=8989"
    container_name: sonarr
    image: ghcr.io/hotio/sonarr:latest
    ports:
      - 8989:8989
    volumes:
      - /etc/localtime:/etc/localtime:ro #read-only
      - /docker/appdata/sonarr:/config
      - /data:/data

###############################################
# LIDARR - Music
###############################################
  lidarr:
    <<: *common-keys
    labels:
      - com.getarcaneapp.arcane.icon=${SELFHST_WEBP}/lidarr.webp
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.lidarr.entrypoints=https"
      - "traefik.http.routers.lidarr.rule=Host(`lidarr.vm1.REDACTED_DOMAIN_1`)"
      - "traefik.http.routers.lidarr.tls=true"
      - "traefik.http.routers.lidarr.tls.certresolver=cloudflare"
      - "traefik.http.services.lidarr.loadbalancer.server.port=8686"
    container_name: lidarr
    image: ghcr.io/hotio/lidarr:latest
    ports:
      - 8686:8686
    volumes:
      - /etc/localtime:/etc/localtime:ro #read-only
      - /docker/appdata/lidarr:/config
      - /data:/data

###############################################
# BAZARR - Subtitles
###############################################
  bazarr:
    <<: *common-keys
    labels:
      - com.getarcaneapp.arcane.icon=${SELFHST_WEBP}/bazarr.webp
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.bazarr.entrypoints=https"
      - "traefik.http.routers.bazarr.rule=Host(`bazarr.vm1.REDACTED_DOMAIN_1`)"
      - "traefik.http.routers.bazarr.tls=true"
      - "traefik.http.routers.bazarr.tls.certresolver=cloudflare"
      - "traefik.http.services.bazarr.loadbalancer.server.port=6767"
    container_name: bazarr
    image: ghcr.io/hotio/bazarr:latest
    ports:
      - 6767:6767
    volumes:
      - /etc/localtime:/etc/localtime:ro #read-only
      - /docker/appdata/bazarr:/config
      - /data/media:/data/media

###############################################
# PROWLARR - Indexer Manager
###############################################
  prowlarr:
    <<: *common-keys
    labels:
      - com.getarcaneapp.arcane.icon=${SELFHST_WEBP}/prowlarr.webp
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.prowlarr.entrypoints=https"
      - "traefik.http.routers.prowlarr.rule=Host(`prowlarr.vm1.REDACTED_DOMAIN_1`)"
      - "traefik.http.routers.prowlarr.tls=true"
      - "traefik.http.routers.prowlarr.tls.certresolver=cloudflare"
      - "traefik.http.services.prowlarr.loadbalancer.server.port=9696"
    container_name: prowlarr
    image: ghcr.io/hotio/prowlarr:latest
    ports:
      - 9696:9696
    volumes:
      - /etc/localtime:/etc/localtime:ro #read-only
      - /docker/appdata/prowlarr:/config

###############################################
# QBITTORRENT - Downloader
###############################################
  qbittorrent:
    <<: *common-keys
    labels:
      - com.getarcaneapp.arcane.icon=${SELFHST_WEBP}/qbittorrent.webp
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.qbittorrent.entrypoints=https"
      - "traefik.http.routers.qbittorrent.rule=Host(`qbittorrent.vm1.REDACTED_DOMAIN_1`)"
      - "traefik.http.routers.qbittorrent.tls=true"
      - "traefik.http.routers.qbittorrent.tls.certresolver=cloudflare"
      - "traefik.http.services.qbittorrent.loadbalancer.server.port=8080"
    container_name: qbittorrent
    image: ghcr.io/hotio/qbittorrent:latest
    ports:
      - 8080:8080
      - 6881:6881
      - 6881:6881/udp
    environment:
      - WEBUI_PORT=8080
      - TORRENTING_PORT=6881
    volumes:
      - /etc/localtime:/etc/localtime:ro #read-only
      - /docker/appdata/qbittorrent:/config
      - /data:/data

  qui:
    <<: *common-keys
    labels:
      - com.getarcaneapp.arcane.icon=${SELFHST_WEBP}/qui.webp
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.qui.entrypoints=https"
      - "traefik.http.routers.qui.rule=Host(`qui.vm1.REDACTED_DOMAIN_1`)"
      - "traefik.http.routers.qui.tls=true"
      - "traefik.http.routers.qui.tls.certresolver=cloudflare"
      - "traefik.http.services.qui.loadbalancer.server.port=7476"
    image: ghcr.io/autobrr/qui:latest
    container_name: qui
    restart: unless-stopped
    ports:
      - "7476:7476"
    volumes:
      - /etc/localtime:/etc/localtime:ro #read-only
      - /docker/appdata/qui:/config
      - /data:/data

###############################################
# ARR Stack Dedicated Network
###############################################

networks:
  default:
    name: arr_network
  proxy:
    external: true

