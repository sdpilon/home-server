    volumes:
      - /etc/localtime:/etc/localtime:ro #read-only
      - /docker/appdata/qui:/config
      - /data:/data

#############################################
# ARR Stack Dedicated Network
#############################################

networks:
  default:
    name: arr_network
  proxy:
    external: true