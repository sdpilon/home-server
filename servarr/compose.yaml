name: servarr
x-arcane:
  icon: ${SELFHST_WEBP}/servarr.webp
  urls:
    - radarr.vm1.REDACTED_DOMAIN_1
    - sonarr.vm1.REDACTED_DOMAIN_1
    - lidarr.vm1.REDACTED_DOMAIN_1
    - bazarr.vm1.REDACTED_DOMAIN_1
    - prowlarr.vm1.REDACTED_DOMAIN_1
    - qbittorrent.vm1.REDACTED_DOMAIN_1
    - qui.vm1.REDACTED_DOMAIN_1

# Common Keys for all apps
x-common-keys: &common-keys
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      PUID: 1000
      PGID: 1000
      TZ: ${TZ}
    networks:
      - default  # Keeps it on arr_network
      - proxy    # Adds it to proxy network for Traefik
    dns:
      - 1.1.1.1
      - 1.0.0.1

services:
#############################################
# RADARR - Movies
#############################################
  radarr:
    <<: *common-keys
    image: ghcr.io/hotio/radarr:latest
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.radarr.entrypoints=https"
      - "traefik.http.routers.radarr.tls=true"
      - "traefik.http.routers.radarr.tls.certresolver=cloudflare"
      - "traefik.http.routers.radarr.rule=Host(`radarr.${DOMAIN}`)"
      - "traefik.http.services.radarr.loadbalancer.server.port=7878"
      - com.getarcaneapp.arcane.icon=${SELFHST_WEBP}/radarr.webp
    volumes:
      - /etc/localtime:/etc/localtime:ro #read-only
      - /docker/appdata/radarr:/config
      - /data:/data

#############################################
# SONARR - TV Shows
#############################################
  sonarr:
    <<: *common-keys
    image: ghcr.io/hotio/sonarr:latest
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.sonarr.entrypoints=https"
      - "traefik.http.routers.sonarr.rule=Host(`sonarr.${DOMAIN}`)"
      - "traefik.http.routers.sonarr.tls=true"
      - "traefik.http.routers.sonarr.tls.certresolver=cloudflare"
      - "traefik.http.services.sonarr.loadbalancer.server.port=8989"
      - com.getarcaneapp.arcane.icon=${SELFHST_WEBP}/sonarr.webp
    volumes:
      - /etc/localtime:/etc/localtime:ro #read-only
      - /docker/appdata/sonarr:/config
      - /data:/data

#############################################
# LIDARR - Music
#############################################
