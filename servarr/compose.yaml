x-arcane:
  icon: ${SELFHST_ICONS:-missing-icon-source}/webp/servarr.webp
  urls:
    - qbittorrent.vm1.REDACTED_DOMAIN_1
    - radarr.vm1.REDACTED_DOMAIN_1
    - sonarr.vm1.REDACTED_DOMAIN_1
    - prowlarr.vm1.REDACTED_DOMAIN_1
    - bazarr.vm1.REDACTED_DOMAIN_1
    - lidarr.vm1.REDACTED_DOMAIN_1

# Common Keys for all apps
x-common-keys: &common-keys
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      PUID: 1000
      PGID: 1000
      TZ: ${TZ}
    networks:
      - default  # Keeps it on arr_network
      - proxy    # Adds it to proxy network for Traefik

services:
#############################################
# GLUETUN - VPN Gateway
#############################################
  gluetun:
    image: qmcgaw/gluetun:v3.41
    container_name: gluetun
    restart: unless-stopped
    env_file: secrets.env
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      - default
      - proxy
    environment:
      - TZ=${TZ}
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=wireguard
      - STREAM_ONLY=on
      - PORT_FORWARD_ONLY=on
      - VPN_PORT_FORWARDING=on
    volumes:
      - /docker/shared/gluetun:/tmp/gluetun
      - /docker/appdata/gluetun:/gluetun
    ports:
      - 6881:6881        # torrent port
      - 6881:6881/udp
    labels:
      - com.getarcaneapp.arcane.icon=${SELFHST_ICONS:-missing-icon-source}/webp/gluetun.webp
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.qbittorrent.entrypoints=https"
      - "traefik.http.routers.qbittorrent.rule=Host(`qbittorrent.${DOMAIN}`)"
      - "traefik.http.routers.qbittorrent.tls=true"
      - "traefik.http.routers.qbittorrent.tls.certresolver=cloudflare"
      - "traefik.http.services.qbittorrent.loadbalancer.server.port=8080"

#############################################
# QBITTORRENT (via VPN) + Port Updater
#############################################
  qbittorrent:
    image: ghcr.io/hotio/qbittorrent:latest
    container_name: qbittorrent
    network_mode: "service:gluetun"
    restart: unless-stopped
    environment:
      - WEBUI_PORT=8080
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    labels:
      - com.getarcaneapp.arcane.icon=${SELFHST_ICONS:-missing-icon-source}/webp/qbittorrent.webp
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /docker/appdata/qbittorrent:/config
      - /data:/data

  qb-port-sync:
    image: alpine:latest
    container_name: qb-port-sync
    network_mode: service:gluetun
    restart: unless-stopped
    volumes:
      - /docker/shared/gluetun:/tmp/gluetun:ro
      - ./update-port.sh:/update-port.sh:ro
    environment:
      - TZ=${TZ}
      - POLL_INTERVAL=30
    labels:
      - com.getarcaneapp.arcane.icon=${SELFHST_ICONS:-missing-icon-source}/webp/alpine-linux.webp
    depends_on:
      - gluetun
      - qbittorrent
    command: ["sh", "/update-port.sh"]

#############################################
# RADARR - Movies
#############################################
  radarr:
    <<: *common-keys
    image: ghcr.io/hotio/radarr:latest
    container_name: radarr
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.radarr.entrypoints=https"
      - "traefik.http.routers.radarr.rule=Host(`radarr.${DOMAIN}`)"
      - "traefik.http.routers.radarr.tls=true"
      - "traefik.http.routers.radarr.tls.certresolver=cloudflare"
      - "traefik.http.services.radarr.loadbalancer.server.port=7878"
      - com.getarcaneapp.arcane.icon=${SELFHST_ICONS:-missing-icon-source}/webp/radarr.webp
    volumes:
      - /etc/localtime:/etc/localtime:ro #read-only
      - /docker/appdata/radarr:/config
      - /data:/data

