      - "traefik.http.services.lidarr.loadbalancer.server.port=8686"
      - com.getarcaneapp.arcane.icon=${SELFHST_WEBP}/lidarr.webp
    volumes:
      - /etc/localtime:/etc/localtime:ro #read-only
      - /docker/appdata/lidarr:/config
