name: servarr

x-arcane:
  icon: ${COMPOSE_PROJECT_NAME}
  urls:
    - qbittorrent.${DOMAIN}
    - radarr.${DOMAIN}
    - sonarr.${DOMAIN}
    - prowlarr.${DOMAIN}
    - bazarr.${DOMAIN}
    - lidarr.${DOMAIN}

#############################################
# common properties fragments
#############################################

x-common-keys: &common-keys
    restart: unless-stopped
    environment:
      PUID: 1000
      PGID: 1000
      TZ: ${TZ}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

x-proxy-common: &proxy-common
    <<: *common-keys
    networks:
      - default  # Keeps it on arr_network
      - proxy    # Adds it to proxy network for Traefik
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy

#############################################
# ARR Stack Dedicated Network
#############################################

networks:
  default:
    name: arr_network
  proxy:
    external: true

services:
#############################################
# GLUETUN - VPN Gateway
#############################################
  gluetun:
    <<: *proxy-common
    container_name: gluetun
    image: qmcgaw/gluetun:v3.41
    env_file:
      - .env.secrets
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /docker/shared/gluetun:/tmp/gluetun
      - /docker/appdata/gluetun:/gluetun
    ports:
      - 6881:6881 # torrent port
      - 6881:6881/udp
    labels:
      - arcane.icon=gluetun
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.qbittorrent.tls=true
      - traefik.http.routers.qbittorrent.entrypoints=https
      - traefik.http.routers.qbittorrent.rule=Host(`qbittorrent.${DOMAIN}`)
      - traefik.http.routers.qbittorrent.tls.certresolver=cloudflare
      - traefik.http.services.qbittorrent.loadbalancer.server.port=8080

#############################################
# QBITTORRENT (via VPN) + Port Updater
#############################################
  qbittorrent:
    <<: *common-keys
    container_name: qbittorrent
    image: ghcr.io/hotio/qbittorrent:latest
    network_mode: "service:gluetun"
    environment:
      - WEBUI_PORT=8080
    labels:
      - arcane.icon=qbittorrent
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /docker/appdata/qbittorrent:/config
      - /data:/data

  qb-port-sync:
    container_name: qb-port-sync
    image: alpine:latest
    restart: unless-stopped
    network_mode: "service:gluetun"
    command: ["sh", "/update-port.sh"]
    depends_on:
      - gluetun
      - qbittorrent
    environment:
      - POLL_INTERVAL=30
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /docker/shared/gluetun:/tmp/gluetun:ro
      - ./update-port.sh:/update-port.sh:ro
    labels:
      - arcane.icon=alpine-linux

#############################################
# RADARR - Movies
#############################################
  radarr:
    <<: *proxy-common
    container_name: radarr
    image: ghcr.io/hotio/radarr:latest
    labels:
      - arcane.icon=radarr
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.radarr.tls=true
      - traefik.http.routers.radarr.entrypoints=https
      - traefik.http.routers.radarr.rule=Host(`radarr.${DOMAIN}`)
      - traefik.http.routers.radarr.tls.certresolver=cloudflare
      - traefik.http.services.radarr.loadbalancer.server.port=7878
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /docker/appdata/radarr:/config
      - /data:/data

#############################################
# SONARR - TV Shows
#############################################
