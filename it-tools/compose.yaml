name: &stack it-tools

x-arcane:
  icon: *stack
  urls:
    - ${COMPOSE_PROJECT_NAME}.${DOMAIN}

networks:
  proxy:
    external: true

services:
  it-tools:
    image: corentinth/it-tools
    restart: unless-stopped
    container_name: ${COMPOSE_PROJECT_NAME}
    networks:
      - proxy
    labels:
      - arcane.icon=${COMPOSE_PROJECT_NAME}
      - traefik.enable=true
      - traefik.http.routers.${COMPOSE_PROJECT_NAME}.entrypoints=https
      - traefik.http.routers.${COMPOSE_PROJECT_NAME}.rule=Host(`${COMPOSE_PROJECT_NAME}.${DOMAIN}`)
      - traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls=true
      - traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls.certresolver=${CERT_RESOLVER}
      - traefik.http.services.${COMPOSE_PROJECT_NAME}.loadbalancer.server.port=80