x-arcane:
  # https://cdn.jsdelivr.net/gh/selfhst/icons@main/webp/
  icon: ${SELFHST_WEBP:-missing-icon-source}/arcane.webp
  urls:
    - arcane.vm1.REDACTED_DOMAIN_1
networks:
  proxy:
    external: true
services:
  arcane:
    container_name: ${STACK}
    image: ghcr.io/getarcaneapp/arcane:latest
    env_file: secrets.env
    restart: unless-stopped
    ports:
      - '3552:3552'
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /app/data/projects:/app/data/projects
      - appdata:/app/data
    environment:
      - APP_URL=http://localhost:3552
      - PUID=1000
      - PGID=1000
    networks:
      - proxy
    labels:
      - com.getarcaneapp.arcane.icon=${SELFHST_WEBP:-missing-icon-source}/${STACK}.webp
      - "traefik.enable=true"
      - "traefik.http.routers.${STACK}.entrypoints=https"
      - "traefik.http.routers.${STACK}.rule=Host(`${STACK}.vm1.REDACTED_DOMAIN_1`)"
      - "traefik.http.routers.${STACK}.tls=true"
      - "traefik.http.routers.${STACK}.tls.certresolver=cloudflare"
      - "traefik.http.services.${STACK}.loadbalancer.server.port=3552"
volumes:
  appdata: