x-arcane:
  icon: ${SELFHST_WEBP}/dockhand.webp
  urls:
    - https://dockhand.vm1.REDACTED_DOMAIN_1
services:
  dockhand:
    image: fnsys/dockhand:latest
    container_name: ${STACK}
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - appdata:/app/data
      - /app/data/projects:/app/data/projects
    labels:
      - com.getarcaneapp.arcane.icon=${SELFHST_WEBP}/${STACK}.webp
      - "traefik.enable=true"
      - "traefik.http.routers.${STACK}.entrypoints=https"  # Changed from websecure
      - "traefik.http.routers.${STACK}.rule=Host(`${STACK}.vm1.REDACTED_DOMAIN_1`)"
      - "traefik.http.routers.${STACK}.tls=true"
      - "traefik.http.routers.${STACK}.tls.certresolver=cloudflare"
      - "traefik.http.services.${STACK}.loadbalancer.server.port=3000"
volumes:
  appdata:
networks:
  proxy:
    external: true