x-arcane:
  icon: ${SELFHST_WEBP}/jellyfin.webp
  urls:
    - https://jellyfin.vm1.REDACTED_DOMAIN_1
networks:
  proxy:
    external: true
services:
  jellyfin:
    container_name: jellyfin
    image: ghcr.io/hotio/jellyfin:latest
    restart: unless-stopped
    logging:
      driver: json-file
    env_file: .env
    environment:
      PUID: 1000
      PGID: 1000
    ports:
      - 8096:8096
      - 8920:8920
    networks:
      - proxy
    volumes:
      - /etc/localtime:/etc/localtime:ro #read-only
      - /docker/appdata/jellyfin:/config
      - /data/media:/data/media:ro #read-only
      - /data/metadata:/data/metadata
    labels:
      - com.getarcaneapp.arcane.icon=${SELFHST_WEBP}/jellyfin.webp
      - "traefik.enable=true"
      - "traefik.http.routers.jellyfin.entrypoints=https"  # Changed from websecure
      - "traefik.http.routers.jellyfin.rule=Host(`jellyfin.vm1.REDACTED_DOMAIN_1`)"
      - "traefik.http.routers.jellyfin.tls=true"
      - "traefik.http.routers.jellyfin.tls.certresolver=cloudflare"
      - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"