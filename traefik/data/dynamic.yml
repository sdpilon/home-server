http:
  routers:
    proxmox:
      rule: "Host(`pve.REDACTED_DOMAIN_1`)"
      entryPoints:
        - https
      service: proxmox
      tls:
        certResolver: cloudflare

    cockpit:
      rule: "Host(`cockpit.vm1.REDACTED_DOMAIN_1`)"
      entryPoints:
        - https
      service: cockpit
      tls:
        certResolver: cloudflare

    zimablade-web:
      rule: "Host(`zimablade.REDACTED_DOMAIN_1`)"
      entryPoints:
        - https
      service: zimablade-web
      tls:
        certResolver: cloudflare

    zimablade-ttyd:
      rule: "Host(`ttyd.zimablade.REDACTED_DOMAIN_1`)"
      entryPoints:
        - https
      service: zimablade-ttyd
      tls:
        certResolver: cloudflare
          

  services:
    proxmox:
      loadBalancer:
        servers:
          - url: "https://pve.REDACTED_DOMAIN_2"
        serversTransport: insecure-transport

    cockpit:
      loadBalancer:
        servers:
          - url: "https://docker.REDACTED_DOMAIN_2:9090"
        serversTransport: insecure-transport

    zimablade-web:
      loadBalancer:
        servers:
          - url: "http://zimablade.REDACTED_DOMAIN_2"

    zimablade-ttyd:
      loadBalancer:
        servers:
          - url: "http://zimablade.REDACTED_DOMAIN_2:2222"

  serversTransports:
    insecure-transport:
      insecureSkipVerify: true  # For Proxmox's self-signed cert
