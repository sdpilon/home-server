x-arcane:
  icon: ${SELFHST_WEBP}/immich.webp

configs:
  ts-serve:
    content: |
      {"TCP":{"443":{"HTTPS":true}},
      "Web":{"$${TS_CERT_DOMAIN}:443":
          {"Handlers":{"/":
          {"Proxy":"http://127.0.0.1:2283"}}}},
      "AllowFunnel":{"$${TS_CERT_DOMAIN}:443":false}}

volumes:
  upload:
    driver: local
    driver_opts:
      type: nfs
      o: addr=ZimaBlade,rw,nfsvers=4
      device: ":/media/SSD-Storage/Data/Gallery/immich"
  immich_pgdata:
    external: true

services:
  tailscale:
    labels:
      com.getarcaneapp.arcane.icon: ${SELFHST_WEBP}/tailscale-light.webp
    image: tailscale/tailscale:latest
    container_name: tailscale-${SERVICE}
    hostname: ${SERVICE}
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      # Tailscale Serve configuration to expose the web interface on your local Tailnet - remove this line if not required
      - TS_SERVE_CONFIG=/config/serve.json 
      - TS_USERSPACE=false
      - TS_ENABLE_HEALTH_CHECK=true # Enable healthcheck endpoint: "/healthz"
      - TS_LOCAL_ADDR_PORT=127.0.0.1:41234 # The <addr>:<port> for the healthz endpoint
      - TS_ACCEPT_DNS=true # Uncomment when using MagicDNS
    configs:
      - source: ts-serve
        target: /config/serve.json
    volumes:
      # Config folder used to store Tailscale files - you may need to change the path
      - ./config:/config 
      # Tailscale requirement - you may need to change the path
      - ./ts/state:/var/lib/tailscale 
    devices:
      - /dev/net/tun:/dev/net/tun # Network configuration for Tailscale to work
    cap_add:
      - net_admin # Tailscale requirement
    #ports:
    #  - 0.0.0.0:${SERVICEPORT}:${SERVICEPORT} # Binding port ${SERVICE}PORT to the local network - may be removed if only exposure to your Tailnet is required
    # If any DNS issues arise, use your preferred DNS provider by uncommenting the config below
    #dns: 
    #  - ${DNS_SERVER}
    healthcheck:
      # Check Tailscale has a Tailnet IP and is operational
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:41234/healthz"] 
      interval: 1m # How often to perform the check
      timeout: 10s # Time to wait for the check to succeed
      retries: 3 # Number of retries before marking as unhealthy
      start_period: 10s # Time to wait before starting health checks
    restart: always

  application:
    labels:
      com.getarcaneapp.arcane.icon: ${SELFHST_WEBP}/immich.webp
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    network_mode: service:tailscale # Sidecar configuration to route ${SERVICE} through Tailscale
    container_name: app-${SERVICE}-server # Name for local container management
    volumes:
      # Do not edit the next line. If you want to change the media storage location on your system, edit the value of UPLOAD_LOCATION in the .env file
      - upload:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      database:
        condition: service_healthy
      tailscale:
        condition: service_healthy
    restart: always
    healthcheck:
      disable: false

  machine-learning:
    labels:
      com.getarcaneapp.arcane.icon: ${SELFHST_WEBP}/immich.webp
    container_name: app-${SERVICE}-machine-learning
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    volumes:
      - ./${SERVICE}-data/model-cache:/cache
    env_file: .env
    restart: always
    healthcheck:
      disable: false

  redis:
    labels:
      com.getarcaneapp.arcane.icon: ${SELFHST_WEBP}/redis.webp
    container_name: app-${SERVICE}-redis
    image: docker.io/valkey/valkey:8-bookworm@sha256:fec42f399876eb6faf9e008570597741c87ff7662a54185593e74b09ce83d177
    healthcheck:
      test: redis-cli ping || exit 1
    restart: always

  database:
    labels:
      com.getarcaneapp.arcane.icon: ${SELFHST_WEBP}/postgresql.webp
    container_name: app-${SERVICE}-postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - immich_pgdata:/var/lib/postgresql/data
    restart: always