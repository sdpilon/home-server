x-arcane:
  icon: ${SELFHST_WEBP:-missing icon source}/immich.webp
  urls:
    - https://immich.vm1.REDACTED_DOMAIN_1
services:
  application:
    restart: unless-stopped
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    container_name: ${STACK}-server
    networks:
      - default  # For talking to redis/postgres
      - proxy    # For Traefik
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - upload:/usr/src/app/upload
      - appdata:/data
    ports:
      - 2283:2283
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      database:
        condition: service_healthy
    labels:
      - com.getarcaneapp.arcane.icon=${SELFHST_WEBP:-missing icon source}/immich.webp
      - "traefik.enable=true"
      - "traefik.http.routers.immich.entrypoints=https"
      - "traefik.http.routers.immich.rule=Host(`immich.vm1.REDACTED_DOMAIN_1`)"
      - "traefik.http.routers.immich.tls=true"
      - "traefik.http.routers.immich.tls.certresolver=cloudflare"
      - "traefik.http.services.immich.loadbalancer.server.port=2283"

  machine-learning:
    restart: unless-stopped
    labels:
      com.getarcaneapp.arcane.icon: ${SELFHST_WEBP:-missing icon source}/immich.webp
    container_name: ${STACK}-machine-learning
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    volumes:
      - immich_mlmodels:/cache
    env_file: .env

  redis:
    restart: unless-stopped
    labels:
      com.getarcaneapp.arcane.icon: ${SELFHST_WEBP:-missing icon source}/redis.webp
    volumes:
      - redis:/data
    container_name: ${STACK}-redis
    image: docker.io/valkey/valkey:8-bookworm@sha256:fec42f399876eb6faf9e008570597741c87ff7662a54185593e74b09ce83d177
    healthcheck:
      test: redis-cli ping || exit 1

  database:
    restart: unless-stopped
    labels:
      com.getarcaneapp.arcane.icon: ${SELFHST_WEBP:-missing icon source}/postgresql.webp
    container_name: ${STACK}-postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - immich_pgdata:/var/lib/postgresql/data

networks:
  default:
    name: immich_network
  proxy:
    external: true

volumes:
  upload:
    driver: local
    driver_opts:
      type: nfs
      o: addr=ZimaBlade,rw,nfsvers=4
      device: ":/media/SSD-Storage/Data/Gallery/immich"
  immich_pgdata:
    external: true
  immich_mlmodels:
    external: true
  redis:
  appdata: